# Stack quick come risorsa Docker Compose di Coolify.
#
# Rete: abilitare "Connect to Predefined Network -> coolify" nella UI, così il
# coolify-proxy raggiunge quick-server. Routing: vedi le caddy labels esplicite
# sotto (NON impostare un dominio nella UI: l'auto-gen di Coolify per i
# compose-from-git e' rotta). Il dominio resta generico via {$QUICK_BASE_DOMAIN}
# (da env del PROXY). Le ${VAR} qui sotto le sostituisce Coolify nell'env della
# risorsa.
#
# Due client OAuth Google distinti:
#  - CLI:          tipo "Desktop app" (solo client_id, PKCE)   -> QUICK_CLI_CLIENT_ID
#  - oauth2-proxy: tipo "Web application" (client_id + secret)  -> GOOGLE_CLIENT_ID/SECRET

services:
  quick-server:
    build: .
    restart: unless-stopped
    environment:
      QUICK_BASE_DOMAIN: ${QUICK_BASE_DOMAIN}        # es. quick.example.com
      QUICK_ALLOWED_DOMAINS: ${QUICK_ALLOWED_DOMAINS}  # domini email Google: uno, lista "a,b", o "*"
      QUICK_OAUTH_CLIENT_ID: ${QUICK_CLI_CLIENT_ID}          # client della CLI (audience + /api/config)
      QUICK_OAUTH_CLIENT_SECRET: ${QUICK_CLI_CLIENT_SECRET:-} # solo se riusi un client Web per la CLI (vuoto per Desktop/PKCE)
      QUICK_OAUTH2_URL: http://oauth2-proxy:4180
      QUICK_META_SECRET: ${QUICK_META_SECRET}
      QUICK_STORAGE: ${QUICK_STORAGE:-local}
      # storage local (bind mount sotto):
      QUICK_SITES_DIR: /srv/quick
      QUICK_META_DIR: /srv/quick-meta
      # storage s3 (usato solo se QUICK_STORAGE=s3):
      QUICK_S3_ENDPOINT: ${QUICK_S3_ENDPOINT:-}
      QUICK_S3_REGION: ${QUICK_S3_REGION:-}
      QUICK_S3_BUCKET: ${QUICK_S3_BUCKET:-}
      QUICK_S3_ACCESS_KEY: ${QUICK_S3_ACCESS_KEY:-}
      QUICK_S3_SECRET_KEY: ${QUICK_S3_SECRET_KEY:-}
      QUICK_S3_PREFIX: ${QUICK_S3_PREFIX:-}
      QUICK_S3_USE_SSL: ${QUICK_S3_USE_SSL:-true}
    # Routing via caddy-docker-proxy. NON impostare un dominio nella UI Coolify:
    # genererebbe label `caddy_0.*` sbagliate per un wildcard reverse-proxy
    # (handle_path + try_files /index.php). Le definiamo noi, esplicite e corrette.
    # Routing con caddy labels ESPLICITE (l'auto-generazione di Coolify dal campo
    # dominio è rotta per un compose-from-git: ingress network sbagliata -> 502,
    # e try_files /index.php -> path riscritti). Quindi: lascia VUOTO il dominio
    # nella UI Coolify, e definiamo noi le label corrette qui sotto.
    #  - dominio generico via {$QUICK_BASE_DOMAIN}: lo risolve Caddy dall'env del
    #    PROXY (come {env.CF_API_TOKEN}); -> aggiungi QUICK_BASE_DOMAIN all'env del
    #    coolify-proxy (Proxy -> Configuration), accanto a CF_API_TOKEN.
    #  - caddy_ingress_network=coolify: la rete su cui il proxy raggiunge il
    #    container (fix del 502; serve "Connect to Predefined Network -> coolify").
    labels:
      caddy: "*.{$QUICK_BASE_DOMAIN}"
      caddy.tls.dns: "cloudflare {env.CF_API_TOKEN}"
      caddy.reverse_proxy: "{{upstreams 8080}}"
      caddy_ingress_network: coolify
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      # Solo per QUICK_STORAGE=local; con s3 il container è stateless e questi
      # mount restano inutilizzati (rimuovili nella UI Coolify se usi s3).
      - /data/coolify/proxy/caddy/data/quick-sites:/srv/quick
      - /data/coolify/proxy/caddy/data/quick-meta:/srv/quick-meta

  oauth2-proxy:
    # Tutta la config via env: Coolify (compose-da-git) NON mette i file del repo
    # nella dir di runtime, quindi un bind ./oauth2-proxy.cfg diventerebbe una dir
    # vuota e oauth2-proxy crasherebbe. Niente file, niente mount.
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_UPSTREAMS: static://202
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${COOKIE_SECRET}
      OAUTH2_PROXY_EMAIL_DOMAINS: ${QUICK_ALLOWED_DOMAINS}
      OAUTH2_PROXY_REDIRECT_URL: https://auth.${QUICK_BASE_DOMAIN}/oauth2/callback
      OAUTH2_PROXY_COOKIE_DOMAINS: .${QUICK_BASE_DOMAIN}
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${QUICK_BASE_DOMAIN}
