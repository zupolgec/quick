# Stack quick per Coolify in modalità "Raw Docker Compose".
#
# In raw mode Coolify deploya il compose COSÌ COM'È (niente auto-generazione di
# label caddy: niente try_files, niente ingress network forzata) e gira
# `docker compose` standard → le ${VAR} qui sotto le sostituisce dall'env della
# risorsa, anche nelle label. Quindi:
#  - il routing è nelle nostre caddy labels esplicite (corrette per un wildcard
#    reverse-proxy), NON nel campo dominio della UI (lascialo vuoto);
#  - il dominio resta generico via ${QUICK_BASE_DOMAIN} (nessun dominio cablato,
#    nessuna var da mettere nel proxy);
#  - le reti le dichiariamo noi: `quicknet` interna (quick-server <-> oauth2-proxy
#    per service name) e `coolify` esterna (il coolify-proxy raggiunge quick-server).
#
# Due client OAuth Google: CLI (riusa il client Web via QUICK_CLI_CLIENT_ID/SECRET)
# e oauth2-proxy (GOOGLE_CLIENT_ID/SECRET).

services:
  quick-server:
    build: .
    restart: unless-stopped
    environment:
      QUICK_BASE_DOMAIN: ${QUICK_BASE_DOMAIN}
      QUICK_ALLOWED_DOMAINS: ${QUICK_ALLOWED_DOMAINS}   # uno, lista "a,b", o "*"
      QUICK_OAUTH_CLIENT_ID: ${QUICK_CLI_CLIENT_ID}
      QUICK_OAUTH_CLIENT_SECRET: ${QUICK_CLI_CLIENT_SECRET:-}  # vuoto per client Desktop/PKCE
      QUICK_OAUTH2_URL: http://oauth2-proxy:4180
      QUICK_META_SECRET: ${QUICK_META_SECRET}
      QUICK_STORAGE: ${QUICK_STORAGE:-local}
      QUICK_SITES_DIR: /srv/quick
      QUICK_META_DIR: /srv/quick-meta
      QUICK_S3_ENDPOINT: ${QUICK_S3_ENDPOINT:-}
      QUICK_S3_REGION: ${QUICK_S3_REGION:-}
      QUICK_S3_BUCKET: ${QUICK_S3_BUCKET:-}
      QUICK_S3_ACCESS_KEY: ${QUICK_S3_ACCESS_KEY:-}
      QUICK_S3_SECRET_KEY: ${QUICK_S3_SECRET_KEY:-}
      QUICK_S3_PREFIX: ${QUICK_S3_PREFIX:-}
      QUICK_S3_USE_SSL: ${QUICK_S3_USE_SSL:-true}
    # Routing del wildcard: label esplicite. ${QUICK_BASE_DOMAIN} lo sostituisce
    # docker compose dall'env della risorsa; {env.CF_API_TOKEN} e {{upstreams}}
    # restano per Caddy. caddy_ingress_network=coolify: rete su cui il proxy
    # raggiunge il container.
    # Forma LISTA (non mappa): i valori con {{...}}/*. restano stringhe e non
    # vengono interpretati come YAML quando Coolify ri-serializza le label.
    labels:
      - "caddy=*.${QUICK_BASE_DOMAIN}"
      - "caddy.tls.dns=cloudflare {env.CF_API_TOKEN}"
      - "caddy.reverse_proxy={{upstreams 8080}}"
      - "caddy_ingress_network=coolify"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      # Solo per QUICK_STORAGE=local; con s3 il container è stateless (rimuovili).
      - /data/coolify/proxy/caddy/data/quick-sites:/srv/quick
      - /data/coolify/proxy/caddy/data/quick-meta:/srv/quick-meta
    networks:
      - quicknet
      - coolify

  oauth2-proxy:
    # immagine ufficiale + mini healthcheck statico (vedi oauth2-proxy.Dockerfile)
    build:
      context: .
      dockerfile: oauth2-proxy.Dockerfile
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_UPSTREAMS: static://202
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${COOKIE_SECRET}
      OAUTH2_PROXY_EMAIL_DOMAINS: ${QUICK_ALLOWED_DOMAINS}
      OAUTH2_PROXY_REDIRECT_URL: https://auth.${QUICK_BASE_DOMAIN}/oauth2/callback
      OAUTH2_PROXY_COOKIE_DOMAINS: .${QUICK_BASE_DOMAIN}
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${QUICK_BASE_DOMAIN}
    networks:
      - quicknet

networks:
  quicknet:
  coolify:
    external: true
